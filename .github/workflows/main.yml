name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_ID: com.mkconnect.app

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux, windows, darwin, freebsd, android, ios]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Set up Android SDK (if needed)
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: "33.0.2"

      - name: Build platform
        run: |
          echo "Building ${{ matrix.platform }}"
          case "${{ matrix.platform }}" in
            linux) fyne-cross linux -arch amd64,386,arm,arm64 ;;
            windows)
              fyne-cross windows -arch amd64 --app-id $APP_ID
              fyne-cross windows -arch 386 --app-id $APP_ID || true ;;
            darwin) fyne-cross darwin -arch amd64,arm64 --app-id $APP_ID ;;
            freebsd) fyne-cross freebsd -arch amd64,386,arm,arm64 || true ;;
            android) fyne-cross android -arch amd64,386,arm,arm64 --app-id $APP_ID || true ;;
            ios) fyne-cross ios -arch amd64,arm64 --app-id $APP_ID || true ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-builds
          path: fyne-cross/dist/

  release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/windows
      - uses: actions/download-artifact@v4
        with:
          name: darwin-builds
          path: dist/macos
      - uses: actions/download-artifact@v4
        with:
          name: freebsd-builds
          path: dist/freebsd
      - uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: dist/android
      - uses: actions/download-artifact@v4
        with:
          name: ios-builds
          path: dist/ios

      - name: Zip builds
        run: |
          cd dist
          for platform in *; do
            if [ -d "$platform" ] && [ "$(ls -A $platform)" ]; then
              zip -r "../MKConnect-${platform}-${{ github.ref_name }}.zip" "$platform"
            fi
          done
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 Multi-platform build from Fyne Cross
            Includes binaries for Linux, Windows, macOS, FreeBSD, Android, and iOS.
          files: "MKConnect-*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
