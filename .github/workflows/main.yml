name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_ID: com.mkconnect.app
  APP_NAME: MKConnect

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.4.3
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Debug fyne-cross
        run: |
          fyne-cross --version
          echo "Building for Linux..."

      - name: Build Linux
        run: fyne-cross linux -arch amd64,386,arm,arm64

      - name: List Linux artifacts
        run: ls -la fyne-cross/dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: fyne-cross/dist/

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.4.3
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Debug fyne-cross
        run: |
          fyne-cross --version
          echo "APP_ID: com.mkconnect.app"
          echo "Building for Windows..."

      - name: Build Windows (only amd64 first)
        run: fyne-cross windows -arch amd64 --app-id=com.mkconnect.app --name="$APP_NAME" --release

      - name: Build Windows 386 (if amd64 succeeds)
        run: fyne-cross windows -arch 386 --app-id=com.mkconnect.app --name="$APP_NAME" --release
        continue-on-error: true  # اگر 386 شکست بخورد، ادامه دهد

      - name: List Windows artifacts
        run: ls -la fyne-cross/dist/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: fyne-cross/dist/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.4.3
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Debug fyne-cross
        run: |
          fyne-cross --version
          echo "APP_ID: com.mkconnect.app"
          echo "Building for macOS..."

      - name: Build macOS
        run: fyne-cross darwin -arch amd64,arm64 --app-id=com.mkconnect.app --name="$APP_NAME" --release

      - name: List macOS artifacts
        run: ls -la fyne-cross/dist/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: fyne-cross/dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: dist/macos

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Zip builds
        run: |
          mkdir -p release
          cd dist
          for platform in *; do
            if [ -d "$platform" ] && [ "$(ls -A "$platform" 2>/dev/null)" ]; then
              echo "Zipping $platform..."
              zip -r "../release/MKConnect-${platform}-${{ github.ref_name }}.zip" "$platform"
            else
              echo "Skipping empty $platform"
            fi
          done
          cd ..

      - name: List zip files
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 Multi-platform build from Fyne Cross
            Includes binaries for Linux, Windows, and macOS.
          files: release/MKConnect-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}