release:
  name: Create Release
  runs-on: ubuntu-latest
  needs:
    - build-linux
    - build-windows
    - build-macos
    - build-freebsd
    - build-android
  steps:
    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-builds
        path: dist/linux

    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-builds
        path: dist/windows

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-builds
        path: dist/macos

    - name: Download FreeBSD artifacts
      uses: actions/download-artifact@v4
      with:
        name: freebsd-builds
        path: dist/freebsd

    - name: Download Android artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-builds
        path: dist/android

    - name: Collect binaries for release
      run: |
        mkdir release
        # Linux
        cp dist/linux/*/*.tar.xz release/ || true
        # Windows
        cp dist/windows/*/*.exe release/ || true
        cp dist/windows/*/*.zip release/ || true
        # macOS
        cp dist/macos/*/*.tar.xz release/ || true
        cp dist/macos/*/*.dmg release/ || true
        # FreeBSD
        cp dist/freebsd/*/*.tar.xz release/ || true
        # Android
        cp dist/android/*/*.apk release/ || true

    - name: List release files
      run: ls -l release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          🚀 Multi-platform build from Fyne Cross
          Includes final binaries for Linux, Windows, macOS, FreeBSD, and Android.
        files: release/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
