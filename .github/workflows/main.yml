name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: MKConnect-gui

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross linux -arch amd64,386,arm,arm64 || true
      - run: |
          mkdir -p dist/linux
          for f in fyne-cross/dist/*; do
            arch=$(basename $f | cut -d'-' -f2)
            ext=${f##*.}
            mv "$f" "dist/linux/${APP_NAME}-linux-${arch}.${ext}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/linux/

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross windows -arch amd64,386 --app-id com.mkconnect.app || true
      - run: |
          mkdir -p dist/windows
          for f in fyne-cross/dist/*; do
            arch=$(basename $f | cut -d'-' -f2)
            mv "$f" "dist/windows/${APP_NAME}-windows-${arch}.zip"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist/windows/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross darwin -arch amd64,arm64 --app-id com.mkconnect.app || true
      - run: |
          mkdir -p dist/macos
          for f in fyne-cross/dist/*; do
            arch=$(basename $f | cut -d'-' -f2)
            mv "$f" "dist/macos/${APP_NAME}-macos-${arch}.tar.gz"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: dist/macos/

  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross freebsd -arch amd64 || true
      - run: |
          mkdir -p dist/freebsd
          for f in fyne-cross/dist/*; do
            mv "$f" "dist/freebsd/${APP_NAME}-freebsd-amd64.tar.gz"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: freebsd-builds
          path: dist/freebsd/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
        with:
          api-level: 33
      - run: fyne-cross android -arch arm,arm64 --app-id com.mkconnect.app || true
      - run: |
          mkdir -p dist/android
          for f in fyne-cross/dist/*; do
            arch=$(basename $f | cut -d'-' -f2)
            mv "$f" "dist/android/${APP_NAME}-android-${arch}.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: dist/android/

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-freebsd
      - build-android
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/linux
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/windows
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: dist/macos
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: freebsd-builds
          path: dist/freebsd
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: dist/android
        continue-on-error: true

      - name: Collect binaries for release
        run: |
          mkdir -p release
          cp -r dist/*/* release/
          ls -l release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 Multi-platform build from Fyne Cross
            Includes binaries for Linux, Windows, macOS, FreeBSD, and Android.
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
