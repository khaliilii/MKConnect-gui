name: MKConnect Fyne Cross Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, 386]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross linux -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds-${{ matrix.arch }}
          path: fyne-cross/dist/

  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, 386]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross windows -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds-${{ matrix.arch }}
          path: fyne-cross/dist/

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: brew install pkg-config
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross darwin -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds-${{ matrix.arch }}
          path: fyne-cross/dist/

  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-33
            build-tools;33.0.2
      - run: |
          sdkmanager "ndk;23.1.7779620"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.1.7779620" >> $GITHUB_ENV
      - run: fyne-cross android -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds-${{ matrix.arch }}
          path: fyne-cross/dist/

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \; || true
          ls -lh release/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 MKConnect Multi-platform Build
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
