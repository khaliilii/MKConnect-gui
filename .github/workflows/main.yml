name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build Linux
        run: fyne-cross linux -arch=amd64,386,arm,arm64 -app-id=com.mkconnect.app || true

      - name: Build Windows
        run: fyne-cross windows -arch=amd64,386,arm,arm64 -app-id=com.mkconnect.app || true

      - name: Build macOS
        run: fyne-cross darwin -arch=amd64,arm64 -app-id=com.mkconnect.app || true

      - name: Build FreeBSD
        run: fyne-cross freebsd -arch=amd64 -app-id=com.mkconnect.app || true

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33,ndk;23.1.7779620'

      - name: Build Android
        run: fyne-cross android -arch=arm,arm64 -app-id=com.mkconnect.app || true

      - name: Collect binaries for release
        run: |
          mkdir -p release
          for dir in fyne-cross/dist/*; do
            [ -d "$dir" ] || continue
            osarch=$(basename "$dir")
            for f in "$dir"/*; do
              [ -f "$f" ] || continue
              mv "$f" "release/${osarch}-$(basename "$f")"
            done
          done
          echo "Files ready for release:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 MKConnect Multi-platform Build
            Includes binaries for all supported platforms:
            - Linux: amd64, 386, arm, arm64
            - Windows: amd64, 386, arm, arm64
            - macOS: amd64, arm64
            - FreeBSD: amd64
            - Android: arm, arm64
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
