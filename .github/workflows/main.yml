name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_ID: com.mkconnect.app

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "PATH is $PATH"
          which fyne-cross
          which go

      - name: Debug fyne-cross
        run: |
          fyne-cross --version || echo "fyne-cross --version failed, continuing anyway"
          echo "APP_ID is $APP_ID"
          go version
          go env
        continue-on-error: true

      - name: Build Linux
        run: |
          echo "Running: fyne-cross linux -arch amd64,386,arm,arm64"
          fyne-cross linux -arch amd64,386,arm,arm64

      - name: List Linux artifacts
        run: ls -R fyne-cross/dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: fyne-cross/dist/

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "PATH is $PATH"
          which fyne-cross
          which go

      - name: Debug fyne-cross
        run: |
          fyne-cross --version || echo "fyne-cross --version failed, continuing anyway"
          echo "APP_ID is $APP_ID"
          go version
          go env
        continue-on-error: true

      - name: Build Windows amd64
        run: |
          echo "Running: fyne-cross windows -arch amd64 --app-id com.mkconnect.app"
          fyne-cross windows -arch amd64 --app-id com.mkconnect.app

      - name: Build Windows 386
        run: |
          echo "Running: fyne-cross windows -arch 386 --app-id com.mkconnect.app"
          fyne-cross windows -arch 386 --app-id com.mkconnect.app
        continue-on-error: true

      - name: List Windows artifacts
        run: ls -R fyne-cross/dist/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: fyne-cross/dist/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "PATH is $PATH"
          which fyne-cross
          which go

      - name: Debug fyne-cross
        run: |
          fyne-cross --version || echo "fyne-cross --version failed, continuing anyway"
          echo "APP_ID is $APP_ID"
          go version
          go env
          xcodebuild -version
          ls -l /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/
        continue-on-error: true

      - name: Build macOS
        run: |
          echo "Running: fyne-cross darwin -arch amd64,arm64 --app-id com.mkconnect.app"
          fyne-cross darwin -arch amd64,arm64 --app-id com.mkconnect.app
        continue-on-error: true

      - name: List macOS artifacts
        run: ls -R fyne-cross/dist/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: fyne-cross/dist/

  build-freebsd:
    name: Build FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "PATH is $PATH"
          which fyne-cross
          which go

      - name: Debug fyne-cross
        run: |
          fyne-cross --version || echo "fyne-cross --version failed, continuing anyway"
          echo "APP_ID is $APP_ID"
          go version
          go env
        continue-on-error: true

      - name: Build FreeBSD
        run: |
          echo "Running: fyne-cross freebsd -arch amd64"
          fyne-cross freebsd -arch amd64
        continue-on-error: true

      - name: List FreeBSD artifacts
        run: ls -R fyne-cross/dist/

      - name: Upload FreeBSD artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-builds
          path: fyne-cross/dist/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "PATH is $PATH"
          which fyne-cross
          which go

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls -R $ANDROID_HOME
        continue-on-error: true

      - name: Debug fyne-cross
        run: |
          fyne-cross --version || echo "fyne-cross --version failed, continuing anyway"
          echo "APP_ID is $APP_ID"
          go version
          go env
        continue-on-error: true

      - name: Build Android
        run: |
          echo "Running: fyne-cross android -arch arm,arm64 --app-id com.mkconnect.app"
          fyne-cross android -arch arm,arm64 --app-id com.mkconnect.app
        continue-on-error: true

      - name: List Android artifacts
        run: ls -R fyne-cross/dist/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: fyne-cross/dist/

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
          echo "PATH is $PATH"
          which fyne-cross
          which go

      - name: Debug fyne-cross
        run: |
          fyne-cross --version || echo "fyne-cross --version failed, continuing anyway"
          echo "APP_ID is $APP_ID"
          go version
          go env
          xcodebuild -version
          ls -l /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/
        continue-on-error: true

      - name: Build iOS
        run: |
          echo "Running: fyne-cross ios -arch arm64 --app-id com.mkconnect.app --certificate ${{ secrets.APPLE_CERTIFICATE }} --certificate-password ${{ secrets.APPLE_CERTIFICATE_PASSWORD }} --provisioning-profile ${{ secrets.APPLE_PROVISIONING_PROFILE }} --team-id ${{ secrets.APPLE_TEAM_ID }}"
          fyne-cross ios -arch arm64 --app-id com.mkconnect.app --certificate ${{ secrets.APPLE_CERTIFICATE }} --certificate-password ${{ secrets.APPLE_CERTIFICATE_PASSWORD }} --provisioning-profile ${{ secrets.APPLE_PROVISIONING_PROFILE }} --team-id ${{ secrets.APPLE_TEAM_ID }}
        continue-on-error: true

      - name: List iOS artifacts
        run: ls -R fyne-cross/dist/

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds
          path: fyne-cross/dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-freebsd
      - build-android
      - build-ios
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: dist/macos

      - name: Download FreeBSD artifacts
        uses: actions/download-artifact@v4
        with:
          name: freebsd-builds
          path: dist/freebsd

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: dist/android

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-builds
          path: dist/ios

      - name: List downloaded artifacts
        run: ls -R dist/

      - name: Zip builds
        run: |
          cd dist
          for platform in *; do
            if [ -d "$platform" ] && [ "$(ls -A $platform)" ]; then
              zip -r "../MKConnect-${platform}-${{ github.ref_name }}.zip" "$platform"
            fi
          done
          cd ..

      - name: List zip files
        run: ls -l MKConnect-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 Multi-platform build from Fyne Cross
            Includes binaries for Linux, Windows, macOS, FreeBSD, Android, and iOS.
          files: "MKConnect-*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
