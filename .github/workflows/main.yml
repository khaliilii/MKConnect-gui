name: Build macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-15-arm64
    env:
      APP_NAME: MKConnect-gui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Xcode CLI
        run: sudo xcode-select --install || true

      - name: Install Rosetta (for amd64 builds)
        run: sudo softwareupdate --install-rosetta --agree-to-license || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build macOS binaries
        run: |
          # ساخت دو معماری arm64 و amd64
          fyne-cross darwin -arch arm64,amd64 --app-id com.mkconnect.app --verbose

      - name: Prepare dist folder
        run: |
          mkdir -p dist/macos
          for f in fyne-cross/dist/*; do
            arch=$(basename "$f" | cut -d'-' -f2)
            mv "$f" "dist/macos/${APP_NAME}-macos-${arch}.tar.gz"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: dist/macos/
