name: MKConnect Fyne Cross Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_ID: com.mkconnect.app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # Linux builds
      - name: Build Linux
        run: fyne-cross linux -arch amd64,386,arm,arm64

      # Windows builds
      - name: Build Windows
        run: fyne-cross windows -arch amd64,386 --app-id $APP_ID

      # macOS builds (skip on error)
      - name: Build macOS
        run: fyne-cross darwin -arch amd64,arm64 --app-id $APP_ID
        continue-on-error: true

      # FreeBSD builds (skip on error)
      - name: Build FreeBSD
        run: fyne-cross freebsd -arch amd64,386,arm,arm64
        continue-on-error: true

      # Android builds (skip on error)
      - name: Build Android
        run: fyne-cross android -arch amd64,386,arm,arm64 --app-id $APP_ID
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fyne-cross-builds
          path: fyne-cross/dist/

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fyne-cross-builds
          path: dist

      - name: Collect binaries for release
        run: |
          mkdir -p release

          # Linux
          if [ -d dist/linux ]; then
            find dist/linux -type f \( -name "*.tar.xz" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          else
            echo "No Linux builds found"
          fi

          # Windows
          if [ -d dist/windows ]; then
            find dist/windows -type f \( -name "*.zip" -o -name "*.exe" \) -exec cp {} release/ \;
          else
            echo "No Windows builds found"
          fi

          # macOS
          if [ -d dist/darwin ]; then
            find dist/darwin -type f \( -name "*.tar.xz" -o -name "*.tar.gz" -o -name "*.dmg" \) -exec cp {} release/ \;
          else
            echo "No macOS builds found"
          fi

          # FreeBSD
          if [ -d dist/freebsd ]; then
            find dist/freebsd -type f \( -name "*.tar.xz" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          else
            echo "No FreeBSD builds found"
          fi

          # Android
          if [ -d dist/android ]; then
            find dist/android -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release/ \;
          else
            echo "No Android builds found"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 Multi-platform build from Fyne Cross
            Includes binaries for Linux, Windows, macOS, FreeBSD, and Android (where available).
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
