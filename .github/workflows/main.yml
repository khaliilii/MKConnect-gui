name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download Go dependencies
        run: go mod download
      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Build Linux
        run: fyne-cross linux -arch amd64,386,arm,arm64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: fyne-cross/dist/

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download Go dependencies
        run: go mod download
      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Build Windows
        run: |
          fyne-cross windows -arch amd64 --app-id com.mkconnect.app
          fyne-cross windows -arch 386 --app-id com.mkconnect.app || true
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: fyne-cross/dist/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download Go dependencies
        run: go mod download
      - name: Install dependencies for CGO
        run: |
          brew install gcc
          export CGO_ENABLED=1
      - name: Install fyne and fyne-cross
        run: |
          set -x
          go install fyne.io/fyne/v2/cmd/fyne@v2.5.0
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          fyne --version || { echo "Error: fyne CLI installation failed"; exit 1; }
      - name: Debug environment
        run: |
          set -x
          echo "PATH: $PATH"
          echo "GOPATH: $(go env GOPATH)"
          which fyne
          which fyne-cross
          fyne-cross --version || true
          fyne --version
          ls -la .
          go version
          xcodebuild -version
          gcc --version
          if [ ! -f "main.go" ]; then echo "Error: main.go not found"; exit 1; fi
          if [ -f "Icon.png" ]; then echo "Icon.png found"; else echo "Warning: Icon.png not found"; fi
      - name: Set up Xcode
        run: |
          set -x
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -sdk macosx -version
      - name: Build macOS
        run: |
          set -x
          if [ ! -x "$(which fyne)" ]; then echo "Error: fyne binary not found in PATH"; exit 1; fi
          fyne-cross darwin -app-id com.mkconnect.app -arch amd64,arm64 -debug
      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: fyne-cross/dist/

  build-freebsd:
    name: Build FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download Go dependencies
        run: go mod download
      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Build FreeBSD
        run: fyne-cross freebsd -arch amd64
      - uses: actions/upload-artifact@v4
        with:
          name: freebsd-builds
          path: fyne-cross/dist/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download Go dependencies
        run: go mod download
      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@v1.5.0
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
        with:
          api-level: 33
      - name: Build Android
        run: fyne-cross android -arch arm,arm64 --app-id com.mkconnect.app
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: fyne-cross/dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-freebsd
      - build-android
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/linux
        continue-on-error: true
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/windows
        continue-on-error: true
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: dist/macos
        continue-on-error: true
      - name: Download FreeBSD artifacts
        uses: actions/download-artifact@v4
        with:
          name: freebsd-builds
          path: dist/freebsd
        continue-on-error: true
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: dist/android
        continue-on-error: true
      - name: Collect binaries for release
        run: |
          mkdir -p release/linux
          mkdir -p release/windows
          mkdir -p release/macos
          mkdir -p release/freebsd
          mkdir -p release/android
          find dist/linux -type f -exec cp {} release/linux/ \; || true
          find dist/windows -type f -exec cp {} release/windows/ \; || true
          find dist/macos -type f -exec cp {} release/macos/ \; || true
          find dist/freebsd -type f -exec cp {} release/freebsd/ \; || true
          find dist/android -type f -exec cp {} release/android/ \; || true
          ls -lR release/ || echo "No release files found"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 Multi-platform build from Fyne Cross
            Includes binaries for:
            - Linux (amd64, 386, arm, arm64)
            - Windows (amd64, 386)
            - macOS (amd64, arm64)
            - FreeBSD (amd64)
            - Android (arm, arm64)
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
