name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross linux -arch=amd64,386,arm,arm64 -app-id=com.mkconnect.app
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: fyne-cross/dist/

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross windows -arch=amd64,386 -app-id=com.mkconnect.app
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: fyne-cross/dist/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross darwin -arch=${{ matrix.arch }} -app-id=com.mkconnect.app -macosx-version-min=11.0
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds-${{ matrix.arch }}
          path: fyne-cross/dist/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
        with:
          api-level: 33
      - run: |
          sdkmanager --update
          sdkmanager "ndk;23.1.7779620"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.1.7779620" >> $GITHUB_ENV
      - run: fyne-cross android -arch=arm,arm64,amd64 -app-id=com.mkconnect.app
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: fyne-cross/dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
        continue-on-error: true

      - name: Collect & Rename binaries
        run: |
          mkdir -p release
          shopt -s globstar
          for f in dist/**; do
            if [ -f "$f" ]; then
              base=$(basename "$f")
              ext="${base##*.}"
              name="${base%.*}"

              # استخراج OS و Arch از مسیر
              os=$(echo "$f" | grep -oE 'linux|windows|darwin|android' || echo "unknown")
              arch=$(echo "$f" | grep -oE 'amd64|386|arm64|arm' || echo "unknown")

              cp "$f" "release/MkConnect-${os}-${arch}.${ext}"
            fi
          done
          ls -l release/ || echo "No files found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 MKConnect Multi-platform Build
            Includes binaries for Linux (amd64, 386, arm, arm64), Windows (amd64, 386), macOS (amd64, arm64), and Android (arm, arm64, amd64).
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
