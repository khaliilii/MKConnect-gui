name: MKConnect Fyne Cross Build & Release (All OS/Arch)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, 386]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross linux -arch=amd64,386,arm,arm64 -app-id=com.mkconnect.app
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: fyne-cross/dist/

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, 386]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross windows -arch=amd64,386 -app-id=com.mkconnect.app
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: fyne-cross/dist/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64, 386]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install dependencies for macOS
        run: |
          brew install pkg-config
          sudo mkdir -p /usr/local/Cellar/osxcross
          sudo chown $USER:admin /usr/local/Cellar/osxcross
          git clone https://github.com/tpoechtrager/osxcross.git /usr/local/Cellar/osxcross
          cd /usr/local/Cellar/osxcross
          ./tools/gen_sdk_package.sh || true
          tar -xzf *.tar.gz -C /usr/local/Cellar/osxcross || true
          export SDK_DIR=/usr/local/Cellar/osxcross/MacOSX11.0.sdk
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
        continue-on-error: true
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross darwin -arch=${{ matrix.arch }} -app-id=com.mkconnect.app -macosx-version-min=11.0
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds-${{ matrix.arch }}
          path: fyne-cross/dist/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
        with:
          api-level: 33
      - name: Update SDK Manager and Install Android NDK
        run: |
          sdkmanager --update
          sdkmanager "ndk;23.1.7779620"
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.1.7779620
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
      - run: fyne-cross android -arch=arm,arm64,amd64 -app-id=com.mkconnect.app
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: fyne-cross/dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/linux
        continue-on-error: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/windows
        continue-on-error: true

      - name: Download macOS amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds-amd64
          path: dist/macos/amd64
        continue-on-error: true

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds-arm64
          path: dist/macos/arm64
        continue-on-error: true

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: dist/android
        continue-on-error: true

      - name: Collect binaries for release
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \; || true
          ls -l release/ || echo "No release files found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 MKConnect Multi-platform Build
            Includes binaries for Linux (amd64, 386, arm, arm64), Windows (amd64, 386), macOS (amd64, arm64), and Android (arm, arm64, amd64).
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}