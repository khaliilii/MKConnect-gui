name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: windows
          - os: ubuntu-latest
            target: freebsd
          - os: ubuntu-latest
            target: android
          - os: macos-latest
            target: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install fyne-cross
        if: matrix.target != 'macos'
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build with fyne-cross
        if: matrix.target != 'macos'
        run: fyne-cross ${{ matrix.target }}

      - name: Build macOS native
        if: matrix.target == 'macos'
        run: |
          mkdir -p dist/macos
          go build -o dist/macos/app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-builds
          path: |
            fyne-cross/dist/**
            dist/macos/**

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
