name: MKConnect Fyne Cross Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, 386, arm, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross linux -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
      - name: Rename artifacts
        run: |
          mkdir -p renamed
          for f in fyne-cross/dist/*; do
            ext="${f##*.}"
            mv "$f" "renamed/MkConnect-linux-${{ matrix.arch }}.$ext"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: renamed/

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm, arm64, amd64, 386]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross windows -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
      - name: Rename artifacts
        run: |
          mkdir -p renamed
          for f in fyne-cross/dist/*; do
            ext="${f##*.}"
            mv "$f" "renamed/MkConnect-windows-${{ matrix.arch }}.$ext"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: renamed/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: brew install pkg-config
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - run: fyne-cross darwin -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
        continue-on-error: true   # ❗ خطا در macOS رو اسکپ می‌کنه
      - name: Rename artifacts
        run: |
          mkdir -p renamed
          for f in fyne-cross/dist/*; do
            ext="${f##*.}"
            mv "$f" "renamed/MkConnect-macos-${{ matrix.arch }}.$ext"
          done || true
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: renamed/
        continue-on-error: true

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          go install github.com/fyne-io/fyne-cross@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - uses: android-actions/setup-android@v3
        with:
          api-level: 33
      - name: Install Android NDK
        run: |
          sdkmanager "ndk;23.1.7779620"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.1.7779620" >> $GITHUB_ENV
      - run: fyne-cross android -arch=${{ matrix.arch }} -app-id=com.mkconnect.app
      - name: Rename artifacts
        run: |
          mkdir -p renamed
          for f in fyne-cross/dist/*; do
            ext="${f##*.}"
            mv "$f" "renamed/MkConnect-android-${{ matrix.arch }}.$ext"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}
          path: renamed/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect binaries
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \; || true
          echo "Collected files:"
          ls -lh release/ || echo "No release files found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🚀 MKConnect Multi-platform Build

            Includes binaries:
            - **Linux**: amd64, 386, arm, arm64
            - **Windows**: amd64, 386
            - **macOS**: amd64, arm64 (if build succeeded)
            - **Android**: amd64, arm, arm64
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
